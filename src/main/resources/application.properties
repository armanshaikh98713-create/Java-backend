# Application name (shows up in Spring Boot Actuator / logs)
spring.application.name=hello-world

# Default port for local development (ignored when deployed on Tomcat)
server.port=8080

# Context path — must match your Tomcat deployment path
# e.g. http://localhost:8080/hello-world/api/hello
server.servlet.context-path=/hello-world

# Logging level
logging.level.com.demo=INFO
